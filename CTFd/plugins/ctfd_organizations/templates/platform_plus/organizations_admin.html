{% extends "platform_plus/_base.html" %}
{% block content %}
<h1>Pending Organizations</h1>
<table class="table">
  <thead><tr><th>Name</th><th>Type</th><th>Website</th><th>Actions</th></tr></thead>
  <tbody>
    {% for org in pending %}
    <tr id="org-row-{{ org.id }}">
      <td>{{ org.name }}</td>
      <td>{{ org.org_type }}</td>
      <td>{{ org.website }}</td>
      <td>
        <button class="btn btn-success btn-sm" onclick="approveOrg({{ org.id }})">Approve</button>
        <button class="btn btn-danger btn-sm" onclick="rejectOrg({{ org.id }})">Reject</button>
      </td>
    </tr>
    {% else %}
    <tr><td colspan="4">No pending organizations.</td></tr>
    {% endfor %}
  </tbody>
</table>
<script>
const CSRF_NONCE = "{{ session.nonce }}";

function postJSON(url) {
  return fetch(url, {
    method: "POST",
    credentials: "same-origin",
    headers: {
      "Content-Type": "application/json",
      "CSRF-Token": CSRF_NONCE,
    },
  }).then(async (r) => {
    if (!r.ok) {
      let detail = "";
      try {
        detail = (await r.json()).message || r.statusText;
      } catch (e) {
        detail = r.statusText;
      }
      throw new Error(`Request failed (${r.status}): ${detail}`);
    }
    return r.json();
  });
}

function approveOrg(id) {
  postJSON(`/plugins/platform-plus/admin/organizations/${id}/verify`)
    .then((d) => {
      if (d.success) document.getElementById(`org-row-${id}`).remove();
    })
    .catch((err) => alert(err.message));
}

function rejectOrg(id) {
  if (!confirm("Reject and delete this organization?")) return;
  postJSON(`/plugins/platform-plus/admin/organizations/${id}/reject`)
    .then((d) => {
      if (d.success) document.getElementById(`org-row-${id}`).remove();
    })
    .catch((err) => alert(err.message));
}
</script>
{% endblock %}
